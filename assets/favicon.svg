<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- FlowFinance "F" logo in Anthropic Orange -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B84438;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Modern "F" design with flow elements -->
  <g filter="url(#glow)">
    <!-- Main F shape -->
    <path d="M 6 4 L 6 28 L 10 28 L 10 18 L 18 18 L 18 14 L 10 14 L 10 8 L 22 8 L 22 4 Z" 
          fill="url(#orangeGradient)" />
    
    <!-- Flow accent curve -->
    <path d="M 24 12 Q 28 16, 24 20 Q 20 24, 16 20" 
          stroke="url(#orangeGradient)" 
          stroke-width="2" 
          fill="none" 
          opacity="0.6"/>
    
    <!-- Small flow dots -->
    <circle cx="26" cy="16" r="1.5" fill="url(#orangeGradient)" opacity="0.8"/>
    <circle cx="24" cy="18" r="1" fill="url(#orangeGradient)" opacity="0.6"/>
    <circle cx="22" cy="20" r="0.8" fill="url(#orangeGradient)" opacity="0.4"/>
  </g>
</svg>
